<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Goldhome — Дома из СИП-панелей под ключ. Тюмень + Краснодар</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Goldhome — производитель СИП-панелей и строительство домов под ключ. Тюмень + Краснодар. Более 400 построенных домов, гарантия 25 лет.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ---- Goldhome Landing — Design System ---- */
:root {
  --bg: #F6F8F4;
  --bg-soft: #EDF1E8;
  --surface: #FFFFFF;
  --ink: #2B2E28;
  --ink-2: #54584E;
  --ink-3: #888D80;
  --line: #E3E7DD;
  --terra: #7DA05E;
  --terra-dark: #6A8B4D;
  --terra-soft: #E7EFDD;
  --walnut: #6F7D5E;
  --green: #5A7740;
  --radius-sm: 10px;
  --radius: 18px;
  --radius-lg: 28px;
  --shadow-sm: 0 2px 4px rgba(43,46,40,.04), 0 8px 24px -12px rgba(43,46,40,.08);
  --shadow: 0 4px 12px rgba(43,46,40,.06), 0 24px 48px -24px rgba(43,46,40,.16);
  --font-sans: 'Manrope', system-ui, sans-serif;
  --font-display: 'Lora', Georgia, 'Times New Roman', serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* Layout */
.page { width: 100%; overflow: hidden; }
.section { padding: 100px 64px; }
.wrap { max-width: 1320px; margin: 0 auto; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--terra);
}
.h-display {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.005em;
  line-height: 1.12;
  color: var(--ink);
  margin: 0;
}
.h1 { font-size: clamp(40px, 4.6vw, 68px); }
.h2 { font-size: clamp(32px, 3.4vw, 50px); }
.h3 { font-size: clamp(22px, 1.8vw, 28px); }
.lead { font-size: 20px; line-height: 1.5; color: var(--ink-2); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  height: 56px; padding: 0 28px; border-radius: 999px;
  font-weight: 600; font-size: 16px; letter-spacing: -0.005em;
  transition: transform .15s ease, background .15s ease, box-shadow .2s ease;
  white-space: nowrap;
}
.btn-primary { background: var(--terra); color: #fff; box-shadow: 0 6px 18px -6px rgba(125,160,94,.6); }
.btn-primary:hover { background: var(--terra-dark); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
.btn-ghost:hover { background: var(--bg-soft); border-color: var(--ink-3); }
.btn-dark { background: var(--ink); color: #fff; }
.btn-dark:hover { background: #1A1614; }
.btn-sm { height: 44px; padding: 0 18px; font-size: 14px; }
.btn-lg { height: 64px; padding: 0 36px; font-size: 17px; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--line);
  padding: 28px;
}
.card-soft {
  background: var(--bg-soft);
  border-radius: var(--radius);
  padding: 28px;
}

/* Image placeholder — striped */
.ph {
  position: relative;
  overflow: hidden;
  background:
    repeating-linear-gradient(135deg,
      #EBE0CC 0 12px,
      #E4D6BD 12px 24px);
  color: var(--walnut);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
}
.ph-label {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.04em;
  background: rgba(255,255,255,.86);
  padding: 6px 10px; border-radius: 6px;
  color: var(--walnut);
}
.ph-dark {
  background:
    repeating-linear-gradient(135deg,
      #3a342d 0 12px,
      #2f2922 12px 24px);
  color: #e8d9b8;
}
.ph-dark .ph-label { background: rgba(0,0,0,.55); color: #f0e2c4; }

/* Tag/Chip */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  background: var(--bg-soft); color: var(--ink-2);
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--line);
}
.chip-terra { background: #E7EFDD; color: #5A7740; border-color: #D4E2C4; }
.chip-dark  { background: var(--ink); color: #fff; border-color: var(--ink); }

/* Divider */
.hr { height: 1px; background: var(--line); margin: 0; border: 0; }

/* Numeric */
.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 500; }

/* Mobile preview frame */
.phone {
  width: 360px;
  border-radius: 44px;
  background: var(--ink);
  padding: 12px;
  box-shadow: 0 30px 80px -30px rgba(42,38,34,.4), 0 6px 12px rgba(42,38,34,.1);
}
.phone-screen {
  border-radius: 32px;
  background: var(--bg);
  overflow: hidden;
  height: 720px;
}

/* Star icon color */
.star { color: #E0A53D; }

/* Utility */
.hide { display: none !important; }
.flex { display: flex; }
.grid { display: grid; }

/* Focus */
:focus-visible { outline: 2px solid var(--terra); outline-offset: 2px; border-radius: 6px; }

/* Sticky header */
.sticky-spacer { height: 88px; }

/* Range input track styling */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--line);
  border-radius: 99px;
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--terra);
  border: 3px solid #fff;
  box-shadow: 0 2px 8px rgba(125,160,94,.4);
  cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--terra);
  border: 3px solid #fff;
  box-shadow: 0 2px 8px rgba(125,160,94,.4);
  cursor: pointer;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
/* ============================================================
   PRIMITIVES — icons, placeholders, ratings
   ============================================================ */

function Icon({ name, size = 20, stroke = 1.6 }) {
  const s = size;
  const common = {
    width: s, height: s, viewBox: "0 0 24 24", fill: "none",
    stroke: "currentColor", strokeWidth: stroke, strokeLinecap: "round", strokeLinejoin: "round",
  };
  switch (name) {
    case "arrow-right": return <svg {...common}><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
    case "phone": return <svg {...common}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    case "menu": return <svg {...common}><path d="M3 6h18M3 12h18M3 18h18"/></svg>;
    case "check": return <svg {...common}><path d="M4 12l5 5L20 6"/></svg>;
    case "plus": return <svg {...common}><path d="M12 5v14M5 12h14"/></svg>;
    case "minus": return <svg {...common}><path d="M5 12h14"/></svg>;
    case "shield": return <svg {...common}><path d="M12 2 4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z"/><path d="M9 12l2 2 4-4"/></svg>;
    case "factory": return <svg {...common}><path d="M3 21V10l6 4V10l6 4V5l6 16H3z"/><path d="M9 17h1M13 17h1M17 17h1"/></svg>;
    case "truck": return <svg {...common}><path d="M1 7h12v10H1zM13 10h5l3 3v4h-8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="17.5" cy="18.5" r="2.5"/></svg>;
    case "leaf": return <svg {...common}><path d="M11 20A7 7 0 0 1 4 13a7 7 0 0 1 7-7c5 0 9 4 9 9-1 5-7 7-9 5z"/><path d="M5 19c4-4 7-6 14-7"/></svg>;
    case "wallet": return <svg {...common}><path d="M3 7h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3z"/><path d="M3 7V5a2 2 0 0 1 2-2h11"/><circle cx="17" cy="14" r="1.5"/></svg>;
    case "ruler": return <svg {...common}><path d="M3 8l13-5 5 13L8 21z"/><path d="M7 9l1.5 1.5M10 8l1.5 1.5M13 7l1.5 1.5M16 6l1.5 1.5"/></svg>;
    case "home": return <svg {...common}><path d="M3 11l9-7 9 7v9a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2v-9z"/></svg>;
    case "users": return <svg {...common}><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    case "tree": return <svg {...common}><path d="M12 2L7 9h3l-4 6h4l-3 5h10l-3-5h4l-4-6h3z"/><path d="M12 20v2"/></svg>;
    case "play": return <svg {...common}><polygon points="6 4 20 12 6 20 6 4" fill="currentColor" stroke="none"/></svg>;
    case "chevron-down": return <svg {...common}><path d="M6 9l6 6 6-6"/></svg>;
    case "chevron-up": return <svg {...common}><path d="M18 15l-6-6-6 6"/></svg>;
    case "chevron-right": return <svg {...common}><path d="M9 18l6-6-6-6"/></svg>;
    case "chevron-left": return <svg {...common}><path d="M15 18l-6-6 6-6"/></svg>;
    case "star": return <svg {...common} fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    case "mail": return <svg {...common}><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 6l10 7 10-7"/></svg>;
    case "map": return <svg {...common}><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
    case "clock": return <svg {...common}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>;
    case "warehouse": return <svg {...common}><path d="M3 9l9-5 9 5v12H3z"/><path d="M7 21v-8h10v8M7 17h10"/></svg>;
    case "flame": return <svg {...common}><path d="M12 2s4 4 4 9a4 4 0 0 1-8 0c0-3 2-5 2-7-2 1-6 4-6 9a8 8 0 0 0 16 0c0-6-6-10-8-11z"/></svg>;
    case "thermo": return <svg {...common}><path d="M14 4v10.5a3.5 3.5 0 1 1-4 0V4a2 2 0 0 1 4 0z"/></svg>;
    case "spark": return <svg {...common}><path d="M12 2v6M12 16v6M2 12h6M16 12h6M5 5l4 4M15 15l4 4M19 5l-4 4M9 15l-4 4"/></svg>;
    default: return null;
  }
}

function Stars({ value = 5, size = 14 }) {
  return (
    <span className="flex" style={{ gap: 2, color: "#E0A53D" }}>
      {[...Array(5)].map((_, i) => <Icon key={i} name="star" size={size} />)}
    </span>
  );
}

function Photo({ src, alt = "", h = 320, style = {}, objectPosition = "center" }) {
  return (
    <div style={{
      position: "relative", height: h, borderRadius: 18, overflow: "hidden",
      background: "var(--bg-soft)", ...style
    }}>
      <img src={src} alt={alt} loading="lazy" style={{
        width: "100%", height: "100%", objectFit: "cover",
        objectPosition, display: "block"
      }}/>
    </div>
  );
}

function RatingPill({ logo, name, value, color }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 12,
      background: "#fff", border: "1px solid var(--line)",
      borderRadius: 14, padding: "10px 14px",
      minWidth: 0, flex: "1 1 0"
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 10,
        background: color || "var(--bg-soft)",
        color: "#fff", display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 14, flexShrink: 0
      }}>{logo}</div>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 12, color: "var(--ink-3)", fontWeight: 500 }}>{name}</div>
        <div className="flex" style={{ alignItems: "center", gap: 6 }}>
          <span className="num" style={{ fontWeight: 600, fontSize: 15 }}>{value}</span>
          <Stars size={11}/>
        </div>
      </div>
    </div>
  );
}

const GH = "https://goldhome.life";
const IMG = {
  hero:         GH + "/img/house-sip.png",
  houseSip:     GH + "/img/house-sip.png",
  houseStone:   GH + "/img/house-stone.png",
  houseFrame:   GH + "/img/house-frame.png",
  houseWood:    GH + "/img/house-wood.jpg",
  ikos:         GH + "/uploads/houses/1775751605152-572673618.png",
  oykia:        GH + "/uploads/houses/1775751299742-887128857.png",
  amaltea:      GH + "/uploads/houses/1775751083263-334411630.png",
  production:   GH + "/img/placeholder-production.png",
};

/* ============================================================
   CALCULATOR COMPONENTS (shared)
   ============================================================ */

const iconBtnStyle = {
  width: 44, height: 44, borderRadius: 999,
  border: "1.5px solid var(--line)", background: "var(--bg)",
  display: "flex", alignItems: "center", justifyContent: "center",
};

const miniBtn = {
  width: 32, height: 32, borderRadius: 999,
  border: "1.5px solid var(--line)", background: "var(--bg)",
  display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
};

function SegControl({ value, onChange, options }) {
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: `repeat(${options.length}, 1fr)`,
      gap: 4, background: "var(--bg)", borderRadius: 14, padding: 4,
      border: "1.5px solid var(--line)",
    }}>
      {options.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)}
          style={{
            height: 46, borderRadius: 10,
            background: value === o.v ? "var(--ink)" : "transparent",
            color: value === o.v ? "#fff" : "var(--ink-2)",
            fontWeight: 500, fontSize: 14,
            transition: "all .15s ease",
          }}>
          {o.l}
        </button>
      ))}
    </div>
  );
}

function CheckRow({ checked, onChange, label, tight }) {
  return (
    <button onClick={() => onChange(!checked)} style={{
      display: "flex", alignItems: "center", gap: 12,
      padding: tight ? "0 16px" : "12px 14px",
      height: tight ? 56 : "auto",
      borderRadius: 12,
      background: checked ? "rgba(125,160,94,0.10)" : "var(--bg)",
      border: checked ? "1.5px solid var(--terra)" : "1.5px solid var(--line)",
      textAlign: "left", lineHeight: 1.3, fontSize: 13, color: "var(--ink)",
      transition: "all .15s ease"
    }}>
      <span style={{
        width: 20, height: 20, borderRadius: 6, flexShrink: 0,
        background: checked ? "var(--terra)" : "#fff",
        border: checked ? "none" : "1.5px solid var(--line)",
        display: "flex", alignItems: "center", justifyContent: "center", color: "#fff",
      }}>
        {checked && <Icon name="check" size={13} stroke={2.5}/>}
      </span>
      <span style={{ fontWeight: 500 }}>{label}</span>
    </button>
  );
}

function ChipToggle({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding: "8px 14px", borderRadius: 999, fontSize: 13, fontWeight: 500,
      background: active ? "var(--ink)" : "#fff",
      color: active ? "#fff" : "var(--ink-2)",
      border: active ? "1.5px solid var(--ink)" : "1.5px solid var(--line)",
      transition: "all .15s ease",
      display: "inline-flex", alignItems: "center", gap: 6,
    }}>
      {active && <Icon name="check" size={12} stroke={3}/>}
      {children}
    </button>
  );
}

function CompactField({ label, hint, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8 }}>
        <div style={{ fontWeight: 600, fontSize: 13, color: "var(--ink)" }}>{label}</div>
        {hint && <div className="num" style={{ fontSize: 12, color: "var(--terra)", fontWeight: 600 }}>{hint}</div>}
      </div>
      {children}
    </div>
  );
}

function PriceRow({ label, value }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14 }}>
      <span style={{ color: "var(--ink-2)" }}>{label}</span>
      <span className="num" style={{ fontWeight: 600, color: "var(--ink)" }}>{value}</span>
    </div>
  );
}

/* ============================================================
   HERO CALCULATOR (compact, right column)
   ============================================================ */

function HeroCalculator() {
  const [area, setArea] = React.useState(85);
  const [type, setType] = React.useState("sip");
  const [floors, setFloors] = React.useState("1");
  const [extras, setExtras] = React.useState({ foundation: true, eng: false, finish: false, mortgage: false });
  const [phone, setPhone] = React.useState("");

  const base = { sip: 14000, frame: 18000, combo: 22000 }[type];
  const floorMult = { "1": 1, "2": 1.25, "mansard": 1.12 }[floors];
  const extraSum = (extras.foundation ? 280000 : 0)
                 + (extras.eng ? 420000 : 0)
                 + (extras.finish ? 540000 : 0);
  const price = Math.round((area * base * floorMult + extraSum) / 1000) * 1000;
  const fmt = (n) => n.toLocaleString("ru-RU").replace(/,/g, " ");

  return (
    <div id="calc" style={{
      background: "#fff", borderRadius: 28, padding: 28,
      boxShadow: "var(--shadow)", border: "1px solid var(--line)",
      display: "flex", flexDirection: "column",
    }}>
      {/* Header: title + live price */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 20, gap: 16 }}>
        <div>
          <div className="eyebrow" style={{ marginBottom: 4 }}>Калькулятор · бесплатно</div>
          <div style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 22, letterSpacing: "-0.01em", lineHeight: 1.15 }}>
            Узнайте стоимость<br/>дома за 15 минут
          </div>
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ fontSize: 11, color: "var(--ink-3)", fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: "0.04em" }}>
            примерно
          </div>
          <div className="num" style={{
            fontFamily: "var(--font-display)", fontWeight: 500,
            fontSize: 26, color: "var(--terra)", marginTop: 2,
            fontVariantNumeric: "tabular-nums", letterSpacing: "-0.01em"
          }}>
            от {fmt(price)} ₽
          </div>
        </div>
      </div>

      {/* Area slider */}
      <CompactField label="Площадь дома" hint={`${area} м²`}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => setArea(Math.max(20, area - 5))} style={miniBtn}>
            <Icon name="minus" size={14}/>
          </button>
          <input
            type="range" min={20} max={250} step={5} value={area}
            onChange={(e) => setArea(+e.target.value)}
            style={{ flex: 1 }}
          />
          <button onClick={() => setArea(Math.min(250, area + 5))} style={miniBtn}>
            <Icon name="plus" size={14}/>
          </button>
        </div>
        <div style={{
          display: "flex", justifyContent: "space-between",
          fontSize: 10, color: "var(--ink-3)", fontFamily: "var(--font-mono)",
          marginTop: 6, padding: "0 30px"
        }}>
          <span>20</span><span>250 м²</span>
        </div>
      </CompactField>

      {/* Type */}
      <CompactField label="Технология">
        <SegControl
          value={type} onChange={setType}
          options={[
            { v: "sip", l: "СИП" },
            { v: "frame", l: "Каркас" },
            { v: "combo", l: "Комбо" },
          ]}
        />
      </CompactField>

      {/* Floors */}
      <CompactField label="Этажность">
